<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JetStash — Manchester Route Atlas · Design Concept v1</title>
<!--
  DESIGN CONCEPT — not a site page.
  The visual reference for the redesigned Manchester route map section,
  authored to the same brand system as the approved Homepage V2 concept
  (public/images/homepage V2/homepage-v2-approved-concept.png).

  Every city sits at its projected real lat/lon (x = 60 + (lon+12)·15.745,
  y = 170 + (58−lat)·18.6, gently nudged only where labels would collide).
  Coastlines are hand-inked and deliberately soft: an atlas etching, not
  a Google Map. The Lahore route is shown lit to demonstrate the hover
  state; all other routes rest dimmed. Solid = direct from Manchester,
  dashed = via connection, matching the data in data/routes.ts.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #06080C; }
  .stage { display: flex; justify-content: center; padding: 40px 0; }
  svg { display: block; }
</style>
</head>
<body>
<div class="stage">
<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Editorial route map of flights from Manchester across Europe, North Africa, the Gulf and South Asia">
  <defs>
    <!-- Panel background: deep ink with a warm brass dawn at the top -->
    <linearGradient id="panelBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0F16"/>
      <stop offset="1" stop-color="#07090D"/>
    </linearGradient>
    <radialGradient id="dawn" cx="0.5" cy="-0.15" r="1.05">
      <stop offset="0" stop-color="#C8932E" stop-opacity="0.16"/>
      <stop offset="0.45" stop-color="#C8932E" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#C8932E" stop-opacity="0"/>
    </radialGradient>
    <!-- Counterweight: a faint warmth behind the South Asia cluster so the
         composition balances against the headline top-left -->
    <radialGradient id="clusterWarmth" cx="0.85" cy="0.72" r="0.5">
      <stop offset="0" stop-color="#C8932E" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#C8932E" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft vignette so the cartography dissolves at the edges -->
    <radialGradient id="fadeGrad" cx="0.5" cy="0.54" r="0.72">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.72" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <mask id="coastFade">
      <rect x="0" y="0" width="1600" height="1000" fill="url(#fadeGrad)"/>
    </mask>
    <!-- Destination glow -->
    <radialGradient id="dotGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C8932E" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#C8932E" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#C8932E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="manGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F7F2E9" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#E0B158" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C8932E" stop-opacity="0"/>
    </radialGradient>
    <!-- Featured route stroke: sand out of Manchester warming to brass -->
    <linearGradient id="featuredRoute" x1="214" y1="254" x2="1410" y2="668" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F2E9" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#E0B158"/>
      <stop offset="1" stop-color="#C8932E"/>
    </linearGradient>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
    <!-- Signature film grain, same language as the photography -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
    </filter>
  </defs>

  <!-- ————————————————— canvas ————————————————— -->
  <rect width="1600" height="1000" rx="28" fill="url(#panelBase)"/>
  <rect width="1600" height="1000" rx="28" fill="url(#dawn)"/>
  <rect width="1600" height="1000" rx="28" fill="url(#clusterWarmth)"/>
  <rect width="1600" height="1000" rx="28" fill="none" stroke="#F7F2E9" stroke-opacity="0.08"/>

  <!-- ————————————————— cartography ————————————————— -->

      <path d="M 60 620 Q 800 594 1540 620"/>
      <path d="M 60 868 Q 800 848 1540 868"/>

      <path d="M 800 170 Q 812 570 796 970"/>

      <!-- Aegean/Turkish south coast → Levant → North Africa → Morocco Atlantic -->
      <path d="M 675 535 Q 682 548 690 561 Q 711 561 732 562 Q 754 569 776 577 Q 797 572 819 568 Q 813 593 808 618 Q 798 640 789 663 Q 778 666 768 670 Q 755 664 743 663 Q 731 665 720 668 Q 697 667 674 667 Q 658 661 642 656 Q 603 654 565 652 Q 551 667 537 682 Q 515 664 493 646 Q 475 641 457 637 Q 432 627 408 618 Q 409 591 410 564 Q 398 563 387 562 Q 342 563 297 564 Q 268 574 240 585 Q 221 588 202 592 Q 180 587 158 583 M 163 590 Q 152 603 142 616 Q 135 620 129 624 Q 112 643 95 663 Q 96 673 98 683 Q 91 698 84 713 Q 72 739 60 765"/>
      <!-- Red Sea, both shores -->
      <path d="M 762 693 Q 772 715 783 737 Q 795 765 808 793 Q 821 825 834 858 Q 844 881 855 905 Q 866 932 878 960"/>
      <path d="M 800 702 Q 812 729 824 756 Q 830 784 837 812 Q 850 832 863 853 Q 879 879 895 905 Q 909 930 923 955"/>
      <!-- Arabian Gulf, south shore + Qatar + Oman -->
      <path d="M 1009 698 Q 1018 708 1028 719 Q 1033 736 1039 754 Q 1044 764 1049 774 Q 1055 768 1060 762 Q 1060 770 1061 778 Q 1076 788 1091 799 Q 1104 788 1118 778 Q 1127 769 1137 761 Q 1145 783 1154 806 Q 1170 819 1186 832 Q 1193 847 1201 862"/>
      <!-- Iran / Makran shore → Karachi → west India -->
      <path d="M 1017 687 Q 1032 714 1047 741 Q 1063 748 1080 756 Q 1096 755 1112 754 Q 1128 749 1145 745 Q 1160 758 1175 771 Q 1196 775 1217 780 Q 1240 780 1264 780 Q 1283 784 1302 788 Q 1314 800 1327 813 Q 1339 821 1351 830 Q 1370 837 1389 845 Q 1391 858 1394 871 Q 1395 883 1396 895 Q 1400 909 1405 923 Q 1409 939 1414 955"/>
      <!-- Caspian hint -->
      <path stroke-opacity="0.05" d="M 1036 421 Q 1060 444 1080 468 Q 1090 496 1097 525 Q 1088 546 1078 566 Q 1063 563 1049 561 Q 1036 538 1026 514 Q 1025 488 1025 462 Q 1030 441 1036 421 Z"/>
    </g>
    <!-- island hints -->
    <g fill="none" stroke="#F7F2E9" stroke-opacity="0.06" stroke-width="1">
      <ellipse cx="487" cy="553" rx="16" ry="9" transform="rotate(-14 487 553)"/>
      <ellipse cx="641" cy="594" rx="14" ry="4" transform="rotate(-8 641 594)"/>
      <ellipse cx="772" cy="596" rx="10" ry="4"/>
    </g>
  </g>

  <!-- ————————————————— routes (rest state: dimmed) ————————————————— -->
  <g fill="none" stroke="#C8932E" stroke-width="1.3" stroke-linecap="round">
    <!-- direct: solid -->
    <path stroke-opacity="0.34" d="M 214 254 Q 104 443 123 661"/>            <!-- Marrakech -->
    <path stroke-opacity="0.34" d="M 214 254 Q 497 291 706 486"/>            <!-- Istanbul -->
    <path stroke-opacity="0.34" d="M 214 254 Q 696 417 1050 782"/>           <!-- Doha -->
    <path stroke-opacity="0.34" d="M 214 254 Q 728 408 1124 770"/>           <!-- Dubai -->
    <path stroke-opacity="0.34" d="M 214 254 Q 720 428 1098 806"/>           <!-- Abu Dhabi -->
    <path stroke-opacity="0.34" d="M 214 254 Q 812 412 1304 786"/>           <!-- Karachi -->
    <path stroke-opacity="0.34" d="M 214 254 Q 863 468 1397 894"/>           <!-- Mumbai -->
    <path stroke-opacity="0.34" d="M 214 254 Q 838 317 1392 610"/>           <!-- Islamabad -->
    <path stroke-opacity="0.34" d="M 214 254 Q 881 373 1464 717"/>           <!-- Delhi -->
    <!-- via connection: dashed -->
    <path stroke-opacity="0.32" stroke-dasharray="2 7" d="M 214 254 Q 621 463 866 849"/>   <!-- Jeddah -->
    <path stroke-opacity="0.32" stroke-dasharray="2 7" d="M 214 254 Q 855 430 1392 821"/>  <!-- Ahmedabad -->
    <path stroke-opacity="0.32" stroke-dasharray="2 7" d="M 214 254 Q 866 334 1440 641"/>  <!-- Amritsar -->
  </g>

  <!-- ————————————————— featured route (hover state): Manchester → Lahore ————————————————— -->
  <g fill="none" stroke-linecap="round">
    <path d="M 214 254 Q 851 348 1410 668" stroke="#C8932E" stroke-width="7" stroke-opacity="0.14" filter="url(#softBlur)"/>
    <path d="M 214 254 Q 851 348 1410 668" stroke="url(#featuredRoute)" stroke-width="2"/>
  </g>
  <!-- aircraft on the featured route -->
  <g transform="translate(927 439) rotate(20.8)" fill="#E0B158">

    <path d="M -1.5 -0.9 L 3.5 -7 L 6 -7 L 2.5 -1 Z"/>
    <path d="M -1.5 0.9 L 3.5 7 L 6 7 L 2.5 1 Z"/>
    <path d="M -9.5 -0.5 L -6.5 -3.4 L -4.8 -3.4 L -7 -0.4 Z"/>
    <path d="M -9.5 0.5 L -6.5 3.4 L -4.8 3.4 L -7 0.4 Z"/>
  </g>

  <!-- ————————————————— featured route callout ————————————————— -->
  <g>
    <rect x="994" y="452" width="262" height="92" rx="12" fill="#0A0D13" fill-opacity="0.88" stroke="#F7F2E9" stroke-opacity="0.12"/>
    <text x="1018" y="482" font-family="'Public Sans', Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="2.4" fill="#E0B158">MANCHESTER → LAHORE</text>
    <text x="1018" y="508" font-family="Fraunces, Georgia, serif" font-size="20" fill="#F7F2E9">8h direct · PIA</text>
    <text x="1018" y="530" font-family="'Public Sans', Arial, sans-serif" font-size="11" font-weight="600" fill="#C8932E">View route guide ↗</text>
  </g>

  <!-- ————————————————— origin: Manchester ————————————————— -->
  <g>
    <circle cx="214" cy="254" r="34" fill="url(#manGlow)"/>
    <circle cx="214" cy="254" r="16" fill="none" stroke="#F7F2E9" stroke-opacity="0.3"/>
    <circle cx="214" cy="254" r="9" fill="none" stroke="#E0B158" stroke-width="1.3"/>
    <circle cx="214" cy="254" r="3.8" fill="#F7F2E9"/>
    <text x="242" y="250" font-family="Fraunces, Georgia, serif" font-size="21" fill="#F7F2E9">Manchester</text>
    <text x="243" y="268" font-family="'Public Sans', Arial, sans-serif" font-size="9" font-weight="600" letter-spacing="2.2" fill="#E0B158">MAN · UK DEPARTURES</text>
  </g>

  <!-- ————————————————— destinations ————————————————— -->
  <!-- rest-state marker: soft glow + brass core; labels Fraunces + small-caps country -->
  <g font-family="Fraunces, Georgia, serif" font-size="16">
    <!-- Marrakech -->
    <g>
      <circle cx="123" cy="661" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="123" cy="661" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="139" y="656" fill="#F7F2E9" fill-opacity="0.68">Marrakech</text>
      <text x="140" y="672" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">MOROCCO</text>
    </g>
    <!-- Istanbul (label above dot; Black Sea coast below) -->
    <g>
      <circle cx="706" cy="486" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="706" cy="486" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="706" y="459" text-anchor="middle" fill="#F7F2E9" fill-opacity="0.68">Istanbul</text>
      <text x="706" y="444" text-anchor="middle" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">TURKEY</text>
    </g>
    <!-- Jeddah -->
    <g>
      <circle cx="866" cy="849" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="866" cy="849" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="848" y="845" text-anchor="end" fill="#F7F2E9" fill-opacity="0.68">Jeddah</text>
      <text x="848" y="861" text-anchor="end" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">SAUDI ARABIA</text>
    </g>
    <!-- Doha (label left) -->
    <g>
      <circle cx="1050" cy="782" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1050" cy="782" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1034" y="778" text-anchor="end" fill="#F7F2E9" fill-opacity="0.68">Doha</text>
      <text x="1034" y="794" text-anchor="end" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">QATAR</text>
    </g>
    <!-- Dubai (label above-right) -->
    <g>
      <circle cx="1124" cy="770" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1124" cy="770" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1140" y="762" fill="#F7F2E9" fill-opacity="0.68">Dubai</text>
      <text x="1141" y="778" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">UAE</text>
    </g>
    <!-- Abu Dhabi (label below) -->
    <g>
      <circle cx="1098" cy="806" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1098" cy="806" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1094" y="832" text-anchor="middle" fill="#F7F2E9" fill-opacity="0.68">Abu Dhabi</text>
      <text x="1094" y="848" text-anchor="middle" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">UAE</text>
    </g>
    <!-- Karachi (label left) -->
    <g>
      <circle cx="1304" cy="786" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1304" cy="786" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1288" y="775" text-anchor="end" fill="#F7F2E9" fill-opacity="0.68">Karachi</text>
      <text x="1288" y="791" text-anchor="end" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">PAKISTAN</text>
    </g>
    <!-- Ahmedabad (label left) -->
    <g>
      <circle cx="1392" cy="821" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1392" cy="821" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1376" y="817" text-anchor="end" fill="#F7F2E9" fill-opacity="0.68">Ahmedabad</text>
      <text x="1376" y="833" text-anchor="end" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">INDIA</text>
    </g>
    <!-- Mumbai (label left) -->
    <g>
      <circle cx="1397" cy="894" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1397" cy="894" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1381" y="890" text-anchor="end" fill="#F7F2E9" fill-opacity="0.68">Mumbai</text>
      <text x="1381" y="906" text-anchor="end" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">INDIA</text>
    </g>
    <!-- Islamabad (label left) -->
    <g>
      <circle cx="1392" cy="610" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1392" cy="610" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1376" y="606" text-anchor="end" fill="#F7F2E9" fill-opacity="0.68">Islamabad</text>
      <text x="1376" y="622" text-anchor="end" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">PAKISTAN</text>
    </g>
    <!-- Amritsar (label right) -->
    <g>
      <circle cx="1440" cy="641" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1440" cy="641" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1456" y="637" fill="#F7F2E9" fill-opacity="0.68">Amritsar</text>
      <text x="1457" y="653" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">INDIA</text>
    </g>
    <!-- Delhi (label right) -->
    <g>
      <circle cx="1464" cy="717" r="14" fill="url(#dotGlow)" opacity="0.6"/>
      <circle cx="1464" cy="717" r="2.8" fill="#C8932E" fill-opacity="0.85"/>
      <text x="1480" y="713" fill="#F7F2E9" fill-opacity="0.68">Delhi</text>
      <text x="1481" y="729" font-family="'Public Sans', Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1.8" fill="#6B7280">INDIA</text>
    </g>
    <!-- Lahore — FEATURED (hover state) -->
    <g>
      <circle cx="1410" cy="668" r="20" fill="url(#dotGlow)"/>
      <circle cx="1410" cy="668" r="8" fill="none" stroke="#E0B158" stroke-width="1.2" stroke-opacity="0.8"/>
      <circle cx="1410" cy="668" r="4" fill="#E0B158"/>
      <text x="1394" y="664" text-anchor="end" font-size="17" fill="#F7F2E9">Lahore</text>

    </g>
  </g>

  <!-- ————————————————— header ————————————————— -->
  <g>
    <text x="64" y="86" font-family="'Public Sans', Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="3.2" fill="#E0B158">THE JETSTASH ROUTE ATLAS</text>
    <text x="62" y="130" font-family="Fraunces, Georgia, serif" font-size="40" fill="#F7F2E9">Manchester to the destinations that matter</text>
    <text x="1536" y="124" text-anchor="end" font-family="'Public Sans', Arial, sans-serif" font-size="12.5" fill="#6B7280">Hover a destination to light its route</text>
  </g>

  <!-- ————————————————— caption / legend ————————————————— -->
  <g font-family="'Public Sans', Arial, sans-serif" font-size="11.5">
    <text x="64" y="962" fill="#6B7280">Drawn for beauty, checked for honesty. Positions are approximate; every route is real.</text>
    <g>
      <line x1="1330" y1="958" x2="1362" y2="958" stroke="#C8932E" stroke-width="1.6" stroke-opacity="0.75"/>
      <text x="1370" y="962" fill="#9CA3B0">Direct</text>
      <line x1="1424" y1="958" x2="1456" y2="958" stroke="#C8932E" stroke-width="1.6" stroke-opacity="0.6" stroke-dasharray="2 6" stroke-linecap="round"/>
      <text x="1464" y="962" fill="#9CA3B0">Via connection</text>
    </g>
  </g>

  <!-- compass, understated -->
  <g transform="translate(1512 880)" stroke="#C8932E" stroke-opacity="0.4" fill="none">
    <circle r="13"/>
    <path d="M 0 -13 L 0 -20" stroke-width="1.4"/>
    <path d="M 0 -6 L 3 3 L 0 1 L -3 3 Z" fill="#C8932E" fill-opacity="0.5" stroke="none"/>
  </g>
  <text x="1512" y="916" text-anchor="middle" font-family="'Public Sans', Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="2" fill="#6B7280">N</text>

  <!-- film grain -->
  <rect width="1600" height="1000" rx="28" filter="url(#grain)" opacity="0.04" style="mix-blend-mode: overlay"/>
</svg>
</div>
</body>
</html>
