<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>JetStash — Manchester Route Atlas · Design Concept v2</title>
<!--
  DESIGN CONCEPT v2 — not a site page.
  Direction: premium airline editorial. Changes from v1:

  1. GROUND STRIP — the Signature Manchester photograph (terminal, tower,
     runway lights at dusk), mirrored, blurred and faded to ~10-16%, used
     only as a lower band that dissolves into ink before the cartography
     begins. Its baked-in sky graphics are masked out entirely; only the
     airport-at-dusk band survives, as pure atmosphere.
  2. THE DEPARTURE — all eastern routes now leave Manchester as a single
     climbing stream on one initial heading (as real departures do), then
     fan to their destinations. Marrakech departs gently south as the lone
     western route.
  3. ONE AIRCRAFT — a single crafted brass aircraft leads the climb-out,
     upper-left, heading toward Europe. The v1 mid-route glyph is removed.

  Geometry, coordinates, hover model, honesty rules unchanged from v1.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #06080C; }
  .stage { display: flex; justify-content: center; padding: 40px 0; }
  svg { display: block; }
</style>
</head>
<body>
<div class="stage">

      <stop offset="0.45" stop-color="#C8932E" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#C8932E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="clusterWarmth" cx="0.85" cy="0.72" r="0.5">
      <stop offset="0" stop-color="#C8932E" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#C8932E" stop-opacity="0"/>

      <stop offset="0.72" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#000000"/>

    </mask>
    <!-- Ground strip: visible only across the panel's lower band, dissolving
         upward into ink long before the cartography's core zone -->

      <stop offset="0.48" stop-color="#000000"/>
      <stop offset="0.66" stop-color="#555555"/>
      <stop offset="0.85" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8e8e8"/>

    <mask id="photoMask">

    <clipPath id="panelClip">
      <rect width="1600" height="1000" rx="28"/>
    </clipPath>
    <filter id="photoBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="9"/>

    <radialGradient id="dotGlow" cx="0.5" cy="0.5" r="0.5">

      <stop offset="0.5" stop-color="#C8932E" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#C8932E" stop-opacity="0"/>

    <radialGradient id="manGlow" cx="0.5" cy="0.5" r="0.5">

      <stop offset="0.5" stop-color="#E0B158" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C8932E" stop-opacity="0"/>

    <linearGradient id="featuredRoute" x1="214" y1="254" x2="1410" y2="668" gradientUnits="userSpaceOnUse">

      <stop offset="0.45" stop-color="#E0B158"/>
      <stop offset="1" stop-color="#C8932E"/>

    <filter id="grain">
